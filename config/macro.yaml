# Phase 3 — 거시 + 시장 국면 (Regime) 설정
#
# PROJECT_SPEC.md §6 Phase 3 완료 조건:
#   - 한국은행 ECOS, FRED에서 금리·환율·CPI·VIX 수집
#   - 룰 기반 레짐 분류기 (Risk-On / Risk-Off / Neutral)
#   - 자산별 레짐 적합도 점수
#
# API 키:
#   ECOS_API_KEY  — https://ecos.bok.or.kr/api    (무료)
#   FRED_API_KEY  — https://fred.stlouisfed.org/docs/api/api_key.html  (무료)
#   → 둘 다 .env 파일에 등록.

# -----------------------------------------------------------
# ECOS (한국은행 경제통계시스템)
# -----------------------------------------------------------
ecos:
  base_url: "https://ecos.bok.or.kr/api/StatisticSearch"
  lookback_months: 60   # 최근 60개월 (5년)

  series:
    base_rate:
      code: "722Y001"
      cycle: "M"
      item: "0101000"
      label: "한국 기준금리"

    usd_krw:
      code: "731Y001"
      cycle: "D"
      item: "0000001"
      label: "원/미국달러 환율"

    cpi:
      code: "901Y009"
      cycle: "M"
      item: "0"
      label: "소비자물가지수"

# -----------------------------------------------------------
# FRED (St. Louis Fed)
# -----------------------------------------------------------
fred:
  base_url: "https://api.stlouisfed.org/fred/series/observations"
  lookback_days: 1825   # 5년

  series:
    vix:
      id: "VIXCLS"
      label: "VIX (공포지수)"

    ust_10y:
      id: "DGS10"
      label: "미국 10년물 국채금리"

    ust_2y:
      id: "DGS2"
      label: "미국 2년물 국채금리"

    spread_10_2:
      id: "T10Y2Y"
      label: "10Y-2Y 장단기 스프레드"

    hy_oas:
      id: "BAMLH0A0HYM2"
      label: "하이일드 신용 스프레드 (OAS)"

# -----------------------------------------------------------
# 레짐 분류기 — 룰 기반
# -----------------------------------------------------------
# 각 feature 가 [-1, +1] 로 정규화됨:
#   +1 = 매우 risk-on,  -1 = 매우 risk-off,  0 = 중립
#
# 점수화 방법: 값이 lo 이하면 direction 부호로 1, hi 이상이면 -direction 부호로 1,
#               그 사이는 선형 보간.
#   direction = +1: 값이 클수록 risk-on (예: 장단기 스프레드 정상화)
#   direction = -1: 값이 클수록 risk-off (예: VIX 상승)
regime:
  features:
    vix:
      lo: 15
      hi: 30
      direction: -1
      weight: 0.30

    hy_oas:
      lo: 3.0
      hi: 6.0
      direction: -1
      weight: 0.25

    spread_10_2:
      lo: -0.5       # 역전 (장단기금리 역전) → risk-off
      hi: 1.5
      direction: 1
      weight: 0.20

    usd_krw:
      lo: 1200       # 강원 → risk-on
      hi: 1450       # 약원 → risk-off
      direction: -1
      weight: 0.15

    base_rate:
      lo: 1.5        # 저금리 → risk-on
      hi: 4.0
      direction: -1
      weight: 0.10

  thresholds:
    risk_on: 0.30    # 종합점수 ≥ +0.3
    risk_off: -0.30  # 종합점수 ≤ -0.3
                     # 그 사이는 neutral

# -----------------------------------------------------------
# 자산별 레짐 선호도 (-1: risk-off 자산, +1: risk-on 자산)
# Phase 1 자산 유니버스와 1:1 매핑.
# Phase 4 (포트폴리오 최적화) 에서 비중 산출에 사용 예정.
# -----------------------------------------------------------
asset_preference:
  "069500": 1.0     # KODEX 200            — risk-on
  "360750": 1.0     # TIGER 미국S&P500     — risk-on
  "133690": 1.0     # TIGER 미국나스닥100  — risk-on (성장주, 민감도 ↑)
  "148070": -0.7    # KOSEF 국고채10년     — risk-off
  "132030": -0.5    # KODEX 골드           — risk-off (헷지)
  "261240": -0.6    # KODEX 미국달러       — risk-off (안전자산)
