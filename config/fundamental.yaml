# Phase 2 — 펀더멘털 스코어링 설정
#
# PROJECT_SPEC.md §6 Phase 2 완료 조건:
#   - DART API로 KOSPI 200 종목의 재무제표 수집
#   - PER, PBR, ROE, 영업이익률, 부채비율 계산
#   - 종목별 펀더멘털 점수(0~100) 산출
#   - 점수 상위 N개 종목 자동 리스트업
#
# 초기 유니버스: KOSPI 시가총액 상위 30종목 (개발·테스트용)
# 정식 KOSPI 200 확장은 pykrx로 시총 상위 200종목을 자동 로드 (Phase 3+ 또는 옵션)

# DART에서 가져올 회계연도. null 이면 가장 최근 사업보고서.
target_year: 2024

# 보고서 종류: "annual" = 사업보고서(11011)
# 분기보고서·반기보고서는 Phase 5(백테스팅) 단계에서 활용
report_type: "annual"

# 펀더멘털 점수 가중치 — 합이 1.0 이 되도록
# (튜닝 대상. 백테스팅으로 검증 전까지는 균등에 가깝게)
score_weights:
  per: 0.20      # 낮을수록 좋음 (역방향)
  pbr: 0.15      # 낮을수록 좋음 (역방향)
  roe: 0.30      # 높을수록 좋음
  opm: 0.20      # 영업이익률, 높을수록 좋음
  debt: 0.15     # 부채비율, 낮을수록 좋음 (역방향)

# 비정상값 컷오프 — 이 범위를 벗어나면 NaN 처리 (적자 기업 등)
# 예: PER 음수 또는 100배 이상이면 정상 비교 불가
sanity_bounds:
  per: { min: 0.1, max: 100.0 }
  pbr: { min: 0.1, max: 50.0 }
  roe: { min: -1.0, max: 1.0 }       # -100% ~ 100%
  opm: { min: -1.0, max: 1.0 }
  debt: { min: 0.0, max: 10.0 }      # 부채비율 자본 대비 1000% 이내

# 상위 N개 리스트업
top_n: 10

