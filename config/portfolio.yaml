# Phase 4 — 포트폴리오 최적화 설정
#
# PROJECT_SPEC.md §6 Phase 4 완료 조건:
#   - PyPortfolioOpt 마코위츠 평균-분산 최적화
#   - 켈리 공식 (하프 켈리)
#   - 제약: 한 자산 최대 비중, 현금 최소 비중
#   - 일일 리포트 자동 생성 (Markdown)

# -----------------------------------------------------------
# 통합 점수 가중치 (Phase 1 기술적 + Phase 3 레짐)
# -----------------------------------------------------------
# Phase 4 의 자산 유니버스는 Phase 1 의 6 종 ETF (다자산).
# Phase 2 (KOSPI 30종) 는 종목 선정용 — 다자산 최적화에는 사용 안 함.
score_weights:
  technical: 0.50   # 모멘텀 + 변동성 기반 0-100 점수
  regime:    0.50   # Phase 3 자산 적합도 (0-100)

# -----------------------------------------------------------
# 기술적 모멘텀 점수
# -----------------------------------------------------------
# 자산별로 lookback_days 기간 수익률 → 유니버스 내 백분위 → 0-100
technical_score:
  momentum_lookback_days: 63    # 약 3개월 (영업일)
  use_vol_adjusted: true        # True면 (수익률 / 변동성) 의 백분위

# -----------------------------------------------------------
# 점수 → 기대수익률 매핑 (마코위츠 입력용)
# -----------------------------------------------------------
# composite_score(0-100) 를 annualized expected return 으로 선형 변환:
#   score=50 → 0%
#   score=100 → +max_expected_return
#   score=0   → -max_expected_return
# 이건 마코위츠의 mu 벡터 입력값. 실제 백테스팅(Phase 5)에서 검증해야 함.
expected_return_mapping:
  max_expected_return: 0.20   # 연 ±20% 가능 가정 (보수적으로 시작)

# -----------------------------------------------------------
# 최적화 제약
# -----------------------------------------------------------
constraints:
  max_weight_per_asset: 0.40    # 한 자산 최대 40%
  min_weight_per_asset: 0.00    # 음수(공매도) 금지
  min_cash_weight: 0.05         # 항상 최소 5% 현금
  risk_free_rate: 0.035         # 한국 기준금리 부근

# -----------------------------------------------------------
# 켈리 공식
# -----------------------------------------------------------
# Half-Kelly: 이론치의 절반만 베팅 (실전에선 추정오차 때문에 풀 켈리 위험)
# 최종: 위험자산 비중 = optimizer 비중 × kelly_fraction
#        나머지 = 현금
kelly:
  fraction: 0.5                 # 0.5 = Half-Kelly
  max_total_risk_weight: 0.95   # 위험자산 합계 상한 (현금 최소 = 1-이 값)

# -----------------------------------------------------------
# 일일 리포트
# -----------------------------------------------------------
report:
  output_dir: "reports"
  include_sections:
    - "regime"        # 현재 시장 국면
    - "scores"        # 자산별 점수
    - "allocation"    # 추천 비중
    - "diff"          # 전일 대비 변경
    - "disclaimer"    # 면책
